# Trigger
on: 
  push:
    branches:
      - main
  workflow_dispatch: 

# Action(s)
jobs:
  qa:
    name: "Quality Assurance"
    runs-on: ubuntu-linux
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v7
      - name: "Install Python"
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'
      - name: "Install libraries"
        run: pip3 install -r requirements.txt
      - name: "Runs tests"
        run: pytest
